<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser Data Manager</title>
    <script type="module" crossorigin src="/assets/popup-hVtw9MlS.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/popup-ByT_rJ7t.css">
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Browser Data Manager</h1>
        <div class="tabs">
          <button class="tab-btn active" data-tab="export">Export</button>
          <button class="tab-btn" data-tab="import">Import</button>
        </div>
      </header>

      <!-- Export Tab -->
      <div id="export-tab" class="tab-content active">
        <p class="description">Select a tab to export its browser data:</p>
        <div id="tab-list" class="tab-list">
          <div class="loading">Loading tabs...</div>
        </div>
        <button id="export-btn" class="btn primary" disabled>Export Selected Tab</button>
      </div>

      <!-- Import Tab -->
      <div id="import-tab" class="tab-content">
        <p class="description">Select a JSON file to import:</p>
        <div class="file-input-wrapper">
          <input type="file" id="file-input" accept=".json" />
          <label for="file-input" class="file-label">Choose File</label>
          <span id="file-name" class="file-name">No file selected</span>
        </div>
      </div>

      <!-- Status Messages -->
      <div id="status" class="status hidden"></div>
    </div>

  </body>
</html>
